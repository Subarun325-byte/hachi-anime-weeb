<nav class="sticky top-0 z-50 border-b border-[var(--color-border)] bg-[var(--color-bg)]/90 backdrop-blur-xl">

    <div class="flex h-16 items-center justify-between">
      <a href="{{ $root }}index.html" class="flex items-center gap-2 text-xl font-bold flex-shrink-0">
        <span class="text-[var(--color-primary)]">八</span>

          <path d="M4 6h16M4 12h16M4 18h16"/>

    <div id="mobile-menu" class="hidden md:hidden pb-4 border-t border-[var(--color-border)] mt-2 pt-4">
